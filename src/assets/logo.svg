<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="100%" height="100%">
  <!-- App icon: four-corner gradient squircle with white camcorder
       (SVG twin of public/app-logo.png, the master for scripts/generate_icons.py) -->
  <defs>
    <clipPath id="squircle">
      <rect width="512" height="512" rx="113" />
    </clipPath>
    <filter id="blend" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="55" />
    </filter>
  </defs>

  <g clip-path="url(#squircle)">
    <!-- Quadrant colors blurred into each other along the midlines -->
    <g filter="url(#blend)">
      <rect x="-64" y="-64" width="320" height="320" fill="#ff7363" />
      <rect x="256" y="-64" width="320" height="320" fill="#fdd745" />
      <rect x="-64" y="256" width="320" height="320" fill="#2767ff" />
      <rect x="256" y="256" width="320" height="320" fill="#33dcb1" />
    </g>

    <!-- White camcorder -->
    <g fill="#ffffff">
      <rect x="111" y="160" width="210" height="193" rx="34" />
      <path d="M 316 224 L 385 179 Q 401 168 401 182 L 401 331 Q 401 345 385 334 L 316 289 Z" />
    </g>
  </g>
</svg>
