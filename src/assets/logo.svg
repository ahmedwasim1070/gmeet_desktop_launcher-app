<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="100%" height="100%">
  <!-- App icon: four-corner gradient squircle with white camcorder
       (SVG twin of the raster icons from scripts/generate_icons.py) -->
  <defs>
    <clipPath id="squircle">
      <rect width="512" height="512" rx="116" />
    </clipPath>
    <filter id="blend" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="31" />
    </filter>
    <linearGradient id="bevel" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#ffffff" stop-opacity="0.09" />
      <stop offset="0.5" stop-color="#ffffff" stop-opacity="0" />
      <stop offset="1" stop-color="#000000" stop-opacity="0.1" />
    </linearGradient>
    <filter id="glyphShadow" x="-30%" y="-30%" width="160%" height="160%">
      <feDropShadow dx="0" dy="6" stdDeviation="11" flood-color="#000000" flood-opacity="0.3" />
    </filter>
  </defs>

  <g clip-path="url(#squircle)">
    <!-- Quadrant colors blurred into each other along the midlines -->
    <g filter="url(#blend)">
      <rect x="-64" y="-64" width="320" height="320" fill="#4db276" />
      <rect x="256" y="-64" width="320" height="320" fill="#f6c032" />
      <rect x="-64" y="256" width="320" height="320" fill="#eb4132" />
      <rect x="256" y="256" width="320" height="320" fill="#4c82f0" />
    </g>
    <rect width="512" height="512" fill="url(#bevel)" />

    <!-- White camcorder -->
    <g filter="url(#glyphShadow)" fill="#ffffff">
      <rect x="157.4" y="196.4" width="143.6" height="125.3" rx="31.3" />
      <path d="M 313 238.4 L 355.5 207.8 Q 363.6 201.8 363.6 211.8 L 363.6 306.2 Q 363.6 316.2 355.5 310.2 L 313 279.6 Z" />
    </g>
  </g>
</svg>
